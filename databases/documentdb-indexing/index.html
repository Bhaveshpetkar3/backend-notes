<script>
  (function () {
    var isDark = function () {
      var attr = document.documentElement.getAttribute("data-theme");
      if (attr) return attr === "dark";
      return window.matchMedia("(prefers-color-scheme: dark)").matches;
    };

    mermaid.initialize({ startOnLoad: false, theme: isDark() ? "dark" : "default" });

    function slugify(text) {
      return text
        .toLowerCase()
        .trim()
        .replace(/[`*_~]/g, "")
        .replace(/[^\w\s-]/g, "")
        .replace(/\s+/g, "-");
    }

    var renderer = new marked.Renderer();
    var seen = {};
    renderer.heading = function (text, level, raw) {
      var slug = slugify(raw);
      seen[slug] = (seen[slug] || 0) + 1;
      if (seen[slug] > 1) slug += "-" + (seen[slug] - 1);
      return "<h" + level + ' id="' + slug + '">' + text + "</h" + level + ">\n";
    };
    renderer.code = function (code, infostring) {
      if (infostring === "mermaid") {
        var escaped = code.replace(/</g, "&lt;");
        return '<div class="mermaid" data-raw="' + escaped.replace(/"/g, "&quot;") + '">' + escaped + "</div>";
      }
      var lang = infostring ? ' class="language-' + infostring + '"' : "";
      return "<pre><code" + lang + ">" + code.replace(/</g, "&lt;") + "</code></pre>";
    };
    marked.use({ renderer: renderer });

    fetch("content.md")
      .then(function (r) { return r.text(); })
      .then(function (md) {
        // Drop the source doc's own hand-written TOC section; we build ours from headings.
        md = md.replace(/## Table of Contents[\s\S]*?\n---\n/, "");
        document.getElementById("article").innerHTML = marked.parse(md);

        var toc = document.getElementById("toc");
        var headings = document.querySelectorAll("#article h2");
        toc.innerHTML = "";
        headings.forEach(function (h) {
          var li = document.createElement("li");
          var a = document.createElement("a");
          a.href = "#" + h.id;
          a.textContent = h.textContent.replace(/^\d+\.\s*/, "");
          li.appendChild(a);
          toc.appendChild(li);
        });

        mermaid.run({ querySelector: ".mermaid" });

        var links = toc.querySelectorAll("a");
        var sections = Array.prototype.slice.call(headings);
        function onScroll() {
          var pos = window.scrollY + 100;
          var current = sections[0];
          sections.forEach(function (s) {
            if (s.offsetTop <= pos) current = s;
          });
          links.forEach(function (a) {
            a.classList.toggle("active", current && a.getAttribute("href") === "#" + current.id);
          });
        }
        window.addEventListener("scroll", onScroll);
        onScroll();
      })
      .catch(function (err) {
        document.getElementById("article").textContent = "Failed to load guide: " + err;
      });

    window.addEventListener("themechange", function (e) {
      mermaid.initialize({ startOnLoad: false, theme: e.detail === "dark" ? "dark" : "default" });
    });
  })();
</script>
